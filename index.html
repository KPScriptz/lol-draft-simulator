// Flatten every champ across eras, tag with its era, bucket by role.
const ALL_CHAMPS = ERAS.flatMap((e) => e.champs.map((c) => ({ ...c, era: e.name, year: e.year })));
const POOL = Object.fromEntries(ROLES.map((r) => [r.id, ALL_CHAMPS.filter((c) => c.r === r.id)]));

// ---- math helpers ----------------------------------------------------------
const randInt = (n) => Math.floor(Math.random() * n);
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const clampInt = (v, lo, hi) => Math.max(lo, Math.min(hi, Math.round(v)));
function initials(name) {
  const parts = name.replace(/[^A-Za-z ']/g, '').split(' ').filter(Boolean);
  if (parts.length > 1) return (parts[0][0] + parts[1][0]).toUpperCase();
  return name.slice(0, 2).toUpperCase();
}
function ratingTone(p) {
  if (p >= 92) return 'text-amber-300 border-amber-300/50 bg-amber-400/10';
  if (p >= 86) return 'text-sky-300 border-sky-300/50 bg-sky-400/10';
  return 'text-slate-300 border-slate-400/40 bg-slate-400/10';
}

// Deterministic 0..1 value from a string + salt (stable for challenge links).
function hash01(str, salt) {
  let h = (2166136261 ^ salt) >>> 0;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  h ^= h >>> 13; h = Math.imul(h, 0x5bd1e995); h ^= h >>> 15;
  return ((h >>> 0) % 100000) / 100000;
}

// Flavor "real-world win rate" derived from power, with a stable per-champ wobble.
function champWinRate(c) {
  const base = 47 + ((c.p - 70) / 29) * 7;
  const jitter = (hash01(c.n, 7) - 0.5) * 2.4;
  return Math.round((base + jitter) * 10) / 10;
}

// Role baselines for the composition model. Per-champ values jitter around these.
const ROLE_BASE = {
  Top:     { dmg: 0.55, tank: 0.78, cc: 0.50, ap: 0.30, scale: 0.55, csRate: 8.0 },
  Jungle:  { dmg: 0.58, tank: 0.55, cc: 0.64, scale: 0.52, ap: 0.45, csRate: 5.4 },
  Mid:     { dmg: 0.80, tank: 0.32, cc: 0.46, ap: 0.72, scale: 0.62, csRate: 8.6 },
  ADC:     { dmg: 0.88, tank: 0.22, cc: 0.18, ap: 0.08, scale: 0.88, csRate: 9.2 },
  Support: { dmg: 0.28, tank: 0.52, cc: 0.86, ap: 0.55, scale: 0.35, csRate: 1.6 },
};

// Per-champion combat attributes (0..1), deterministic from name + role + power.
function champAttrs(c) {
  const b = ROLE_BASE[c.r];
  const power = (c.p - 80) / 20; // ~ -0.1 .. 1
  const j = (base, salt) => clamp(base + (hash01(c.n, salt) - 0.5) * 0.34, 0.05, 0.98);
  return {
    dmg:   clamp(j(b.dmg, 11) + power * 0.06, 0.05, 0.99),
    tank:  j(b.tank, 22),
    cc:    j(b.cc, 33),
    ap:    j(b.ap, 44),    // 0 = full AD, 1 = full AP
    scale: j(b.scale, 55), // 0 = early, 1 = late
    csRate: b.csRate,
  };
}

// Short descriptive tags so players can draft for COMPOSITION, not just win rate.
function champTags(c) {
  const a = champAttrs(c);
  const tags = [{ k: a.ap >= 0.5 ? 'AP' : 'AD', tone: a.ap >= 0.5 ? 'bg-sky-500/15 text-sky-300' : 'bg-orange-500/15 text-orange-300' }];
  if (a.tank >= 0.62) tags.push({ k: 'Frontline', tone: 'bg-emerald-500/15 text-emerald-300' });
  if (a.cc >= 0.62)   tags.push({ k: 'Engage',    tone: 'bg-fuchsia-500/15 text-fuchsia-300' });
  if (a.dmg >= 0.74)  tags.push({ k: 'Carry',     tone: 'bg-amber-500/15 text-amber-300' });
  if (a.scale >= 0.7) tags.push({ k: 'Scales',    tone: 'bg-violet-500/15 text-violet-300' });
  return tags.slice(0, 3);
}

// Evaluate a 5-champ team into a 0..100 rating + sub-scores + comp flaws.
function evalComp(champs) {
  const attrs = champs.map(champAttrs);
  const sum = (k) => attrs.reduce((s, a) => s + a[k], 0);
  const avgPower = champs.reduce((s, c) => s + c.p, 0) / champs.length;

  const apShare = sum('ap') / champs.length;        // 0..1
  const mixPenalty = Math.abs(apShare - 0.5);       // 0 ideal .. 0.5 worst

  const rPower   = clamp((avgPower - 78) / 16, 0, 1);
  const rDamage  = clamp(sum('dmg') / 3.6, 0, 1);
  const rFront   = clamp(sum('tank') / 2.8, 0, 1);
  const rEngage  = clamp(sum('cc') / 3.0, 0, 1);
  const rBalance = clamp(1 - mixPenalty * 1.8, 0, 1);

  // Comp matters more than raw power in aggregate.
  const score01 =
    rPower * 0.30 + rDamage * 0.18 + rFront * 0.19 + rEngage * 0.18 + rBalance * 0.15;

  const flaws = [];
  if (rFront < 0.34)  flaws.push('No frontline — your carries get blown up in fights');
  if (rEngage < 0.32) flaws.push('No engage — you can never start a fight on your terms');
  if (rDamage < 0.36) flaws.push('Not enough damage to actually close games');
  if (mixPenalty > 0.32) flaws.push(apShare > 0.5 ? 'All-AP — the enemy just stacks magic resist' : 'All-AD — the enemy just stacks armor');

  const rating = clamp(score01 - flaws.length * 0.06, 0.05, 1) * 100;
  return { rating, sub: { power: rPower, damage: rDamage, front: rFront, engage: rEngage, balance: rBalance }, apShare, flaws };
}

const ROLE_LABEL = { Top: 'Top laners', Jungle: 'Junglers', Mid: 'Mid laners', ADC: 'ADCs', Support: 'Supports' };

// Deal k unique-by-name champions for a role, ranked by win rate (best first).
function rollRole(roleId, k = 5) {
  const a = [...POOL[roleId]];
  const seen = new Set();
  const out = [];
  while (a.length && out.length < k) {
    const c = a.splice(randInt(a.length), 1)[0];
    if (seen.has(c.n)) continue;
    seen.add(c.n);
    out.push(c);
  }
  return out.sort((x, y) => champWinRate(y) - champWinRate(x));
}

// A fresh CPU enemy team — one champ per role, avoiding a mirror of your pick.
function randomEnemyTeam(yourNamesByRole) {
  return ROLES.map((r) => {
    const filtered = POOL[r.id].filter((c) => c.n !== yourNamesByRole[r.id]);
    const pool = filtered.length ? filtered : POOL[r.id];
    return pool[randInt(pool.length)];
  });
}

// ---- per-game stat generation ---------------------------------------------
// Spread an integer total across weights, proportionally, remainder to top fracs.
function distribute(total, weights) {
  const sumW = weights.reduce((a, b) => a + b, 0) || 1;
  const raw = weights.map((w) => (total * w) / sumW);
  const out = raw.map(Math.floor);
  let rem = total - out.reduce((a, b) => a + b, 0);
  const fr = raw.map((v, i) => [v - Math.floor(v), i]).sort((a, b) => b[0] - a[0]);
  for (let i = 0; i < rem; i++) out[fr[i % fr.length][1]]++;
  return out;
}

const KILL_ROLE = { Top: 0.85, Jungle: 0.95, Mid: 1.15, ADC: 1.35, Support: 0.3 };

function genTeamStats(champs, teamKills, teamDeaths, teamAssists, isWinner, dur) {
  const attrs = champs.map(champAttrs);
  const killW   = champs.map((c, i) => (0.35 + attrs[i].dmg) * KILL_ROLE[c.r] * (0.7 + hash01(c.n, 70 + i)));
  const assistW = champs.map((c, i) => (0.5 + attrs[i].cc + (c.r === 'Support' ? 0.9 : 0)) * (0.7 + hash01(c.n, 80 + i)));
  const deathW  = champs.map((c, i) => (0.6 + attrs[i].tank * 0.8 + (c.r === 'Support' ? 0.25 : 0)) * (0.7 + hash01(c.n, 90 + i)));
  const kills = distribute(teamKills, killW);
  const assists = distribute(teamAssists, assistW);
  const deaths = distribute(teamDeaths, deathW);
  return champs.map((c, i) => {
    const csPerMin = ROLE_BASE[c.r].csRate * (isWinner ? 1.06 : 0.94) * (0.86 + hash01(c.n, 100 + i) * 0.28);
    const cs = Math.round(csPerMin * dur + (c.r === 'Jungle' ? dur * 0.7 : 0));
    return { champ: c, k: kills[i], d: deaths[i], a: assists[i], cs };
  });
}

function genObjectives(win, dominance, dur) {
  if (win) {
    return {
      towers: clampInt(6 + dominance * 5 + randInt(2), 4, 11),
      drakes: clampInt(2 + randInt(3), 1, 5),
      barons: dur > 26 ? 1 + randInt(2) : randInt(2),
    };
  }
  return {
    towers: clampInt(randInt(5) + dominance, 0, 7),
    drakes: randInt(3),
    barons: dur > 32 ? randInt(2) : 0,
  };
}

function teamGold(players, obj, dur) {
  const cs = players.reduce((s, p) => s + p.cs, 0);
  const k = players.reduce((s, p) => s + p.k, 0);
  const a = players.reduce((s, p) => s + p.a, 0);
  return Math.round(2400 * 5 * (dur / 32) + cs * 20 + k * 300 + a * 75 + obj.towers * 330 + obj.drakes * 220 + obj.barons * 900);
}

const pogScore = (p) => p.k * 3 + p.a - p.d + p.cs * 0.02;

function buildGame(i, yourChamps, enemyChamps, win, dominance) {
  const dur = clampInt((win ? 38 - dominance * 12 : 40 - dominance * 9) + (Math.random() * 6 - 3), 19, 47);
  const winnerKills = clampInt(15 + dominance * 22 + randInt(8), 10, 52);
  const loserKills  = clampInt(7 + (1 - dominance) * 12 + randInt(6), 2, 26);
  const yK = win ? winnerKills : loserKills;
  const eK = win ? loserKills : winnerKills;
  const yA = Math.round(yK * (1.5 + Math.random() * 0.7));
  const eA = Math.round(eK * (1.5 + Math.random() * 0.7));

  const yourPlayers  = genTeamStats(yourChamps, yK, eK, yA, win, dur);
  const enemyPlayers = genTeamStats(enemyChamps, eK, yK, eA, !win, dur);

  const yObj = genObjectives(win, dominance, dur);
  const eObj = genObjectives(!win, dominance, dur);
  if (yObj.drakes + eObj.drakes > 5) {
    if (win) eObj.drakes = Math.max(0, 5 - yObj.drakes);
    else yObj.drakes = Math.max(0, 5 - eObj.drakes);
  }

  const pog = [...yourPlayers].sort((a, b) => pogScore(b) - pogScore(a))[0].champ;

  return {
    i, opp: OPPONENTS[(i - 1) % OPPONENTS.length], win,
    dur: `${dur}:${String(randInt(60)).padStart(2, '0')}`,
    your:  { k: yK, a: yA, d: eK, gold: teamGold(yourPlayers, yObj, dur),  obj: yObj, players: yourPlayers },
    enemy: { k: eK, a: eA, d: yK, gold: teamGold(enemyPlayers, eObj, dur), obj: eObj, players: enemyPlayers },
    pog,
  };
}

// ---- challenge-link encoding (no backend) ----------------------------------
function encodeChallenge(roster, result, name) {
  const payload = {
    n: (name || '').slice(0, 24),
    rec: [result.wins, result.losses],
    rat: result.rating,
    mvp: result.mvpName,
    r: ROLES.map((role) => { const c = roster[role.id]; return [c.n, c.r, c.p]; }),
  };
  try { return btoa(unescape(encodeURIComponent(JSON.stringify(payload)))); }
  catch { return ''; }
}
function decodeChallenge(str) {
  try {
    const obj = JSON.parse(decodeURIComponent(escape(atob(str))));
    if (!obj || !Array.isArray(obj.rec) || !Array.isArray(obj.r)) return null;
    // each roster entry must be [name, role, power] with a valid role
    const okRoster = obj.r.length > 0 && obj.r.every(
      (e) => Array.isArray(e) && typeof e[0] === 'string' && ROLE_MAP[e[1]]
    );
    if (!okRoster) return null;
    return obj;
  } catch { return null; }
}
function readChallengeFromUrl() {
  if (typeof window === 'undefined') return null;
  const m = (window.location.hash || '').match(/[#&]c=([^&]+)/);
  return m ? decodeChallenge(decodeURIComponent(m[1])) : null;
}
function shareBaseUrl() {
  if (typeof window === 'undefined') return '';
  return window.location.origin + window.location.pathname;
}

// ---- the one and only app component ----------------------------------------
function DraftSimulator() {
  const [roster, setRoster] = useState({ Top: null, Jungle: null, Mid: null, ADC: null, Support: null });
  const [roll, setRoll] = useState(null);            // { role, options:[champ x5] }
  const [rerollUsed, setRerollUsed] = useState(false); // one reroll per run
  const [phase, setPhase] = useState('draft');        // 'draft' | 'result'
  const [result, setResult] = useState(null);
  const [openGame, setOpenGame] = useState(null);
  const [challenge, setChallenge] = useState(readChallengeFromUrl);

  const emptyRoles = ROLES.filter((r) => !roster[r.id]).map((r) => r.id);
  const filled = 5 - emptyRoles.length;
  const complete = emptyRoles.length === 0;
  const nextRole = emptyRoles[0];

  function rollPatch() {
    if (!nextRole) return;
    setRoll({ role: nextRole, options: rollRole(nextRole, 5) });
  }
  function rerollChampions() {
    if (rerollUsed || !roll) return;
    setRoll({ role: roll.role, options: rollRole(roll.role, 5) });
    setRerollUsed(true);
  }
  function rerollRole() {
    if (rerollUsed || !roll) return;
    const others = emptyRoles.filter((r) => r !== roll.role);
    if (!others.length) return;
    const role = others[randInt(others.length)];
    setRoll({ role, options: rollRole(role, 5) });
    setRerollUsed(true);
  }
  function lockIn(champ) {
    setRoster((prev) => ({ ...prev, [champ.r]: champ }));
    setRoll(null);
  }

  function simulate() {
    const yourChamps = ROLES.map((r) => roster[r.id]);
    const yourComp = evalComp(yourChamps);
    const yourNamesByRole = Object.fromEntries(ROLES.map((r) => [r.id, roster[r.id].n]));

    const games = [];
    let wins = 0;
    const pogTally = {};
    for (let i = 0; i < 18; i++) {
      const enemyChamps = randomEnemyTeam(yourNamesByRole);
      const enemyComp = evalComp(enemyChamps);
      const diff = yourComp.rating - enemyComp.rating;
      const p = clamp(1 / (1 + Math.exp(-diff / 12)), 0.08, 0.94);
      const win = Math.random() < p;
      if (win) wins++;
      // Expected results are lopsided; upsets are close games.
      const favored = diff > 0;
      const dominance = win === favored
        ? clamp(Math.abs(diff) / 45 + (Math.random() * 0.2 - 0.1), 0.1, 0.92)
        : clamp(0.12 + Math.random() * 0.2, 0.08, 0.42);
      const game = buildGame(i + 1, yourChamps, enemyChamps, win, dominance);
      games.push(game);
      pogTally[game.pog.n] = (pogTally[game.pog.n] || 0) + 1;
    }
    const mvpName = Object.entries(pogTally).sort((a, b) => b[1] - a[1])[0]?.[0] || yourChamps[0].n;
    setResult({ wins, losses: 18 - wins, rating: Math.round(yourComp.rating), comp: yourComp, games, mvpName });
    setPhase('result');
    setOpenGame(null);
  }

  function restart() {
    setRoster({ Top: null, Jungle: null, Mid: null, ADC: null, Support: null });
    setRoll(null);
    setRerollUsed(false);
    setResult(null);
    setOpenGame(null);
    setPhase('draft');
  }

  const liveComp = complete ? evalComp(ROLES.map((r) => roster[r.id])) : null;

  return (
    <div className="min-h-screen w-full bg-[radial-gradient(60%_50%_at_50%_0%,rgba(56,189,248,0.10),transparent),radial-gradient(50%_40%_at_80%_10%,rgba(250,204,21,0.08),transparent)] bg-slate-950">
      <div className="mx-auto max-w-5xl px-4 py-8 sm:py-12">

        <ChallengeBanner challenge={challenge} onDismiss={() => setChallenge(null)} />

        {/* Header */}
        <header className="mb-8 text-center">
          <div className="mb-3 inline-flex items-center gap-2 rounded-full border border-amber-400/30 bg-amber-400/5 px-4 py-1 text-xs font-semibold uppercase tracking-[0.25em] text-amber-300">
            <Flame className="h-3.5 w-3.5" /> Draft & Match Sim
          </div>
          <h1 className="bg-gradient-to-r from-amber-200 via-yellow-400 to-sky-300 bg-clip-text text-4xl font-bold tracking-tight text-transparent sm:text-6xl drop-shadow-[0_2px_20px_rgba(250,204,21,0.25)]">
            DRAFT SIMULATOR
          </h1>
          <p className="mt-2 text-sm font-medium tracking-wide text-slate-400 sm:text-base">
            Build a comp that <span className="font-bold text-sky-300">synergizes</span>. Out-draft the enemy team. Chase the <span className="font-bold text-amber-300">18-0 split.</span>
          </p>
        </header>

        {/* Roster board */}
        <section className="mb-6">
          <div className="mb-3 flex items-center justify-between">
            <h2 className="flex items-center gap-2 text-sm font-bold uppercase tracking-widest text-slate-300">
              <Shield className="h-4 w-4 text-sky-400" /> Your Roster
            </h2>
            <span className="rounded-full border border-slate-700 bg-slate-900/60 px-3 py-1 text-xs font-bold text-slate-300">
              {filled} / 5 locked
            </span>
          </div>
          <div className="grid grid-cols-2 gap-3 sm:grid-cols-5">
            {ROLES.map((role) => (
              <RosterSlot key={role.id} role={role} champ={roster[role.id]} />

        </section>

        {/* ---------- DRAFT PHASE ---------- */}
        {phase === 'draft' && (
          <section className="rounded-3xl border border-slate-800 bg-slate-900/40 p-5 backdrop-blur-sm sm:p-6">
            {!complete ? (

                    <Dices className="h-5 w-5 transition-transform group-hover:rotate-12" />
                    Roll {ROLE_LABEL[nextRole]}
                    <span className="absolute inset-0 -translate-x-full bg-white/20 transition-transform duration-500 group-hover:translate-x-full" />
                  </button>
                  <p className="max-w-md text-center text-sm text-slate-500">
                    Deals <span className="font-semibold text-slate-300">5 random {ROLE_LABEL[nextRole].toLowerCase()}</span>, ranked by win rate. But win rate doesn't win games — <span className="text-slate-300">check the comp tags</span> and build a balanced team.
                  </p>
                  <span className="inline-flex items-center gap-1.5 rounded-full border border-slate-700 bg-slate-900/60 px-3 py-1 text-[11px] font-semibold uppercase tracking-widest text-slate-400">
                    {rerollUsed
                      ? (<><Lock className="h-3 w-3" /> Reroll spent this run</>)
                      : (<><RotateCcw className="h-3 w-3 text-emerald-300" /> 1 reroll available</>)}

                <div>

                    const RoleIcon = role.Icon;
                    return (
                      <div className="mb-4 flex flex-wrap items-center gap-3">
                        <div className={`grid h-11 w-11 shrink-0 place-items-center rounded-xl bg-gradient-to-br ${role.grad} text-slate-950 shadow-lg ${role.glow}`}>

                          <div className="text-lg font-bold text-slate-100">5 {ROLE_LABEL[roll.role].toLowerCase()} · pick for your comp</div>

                  })()}

                  <div className="grid gap-2">
                    {roll.options.map((champ, idx) => (

                      <div className="flex flex-wrap items-center justify-center gap-2">
                        <span className="text-xs font-semibold uppercase tracking-widest text-emerald-300">1 reroll left:</span>
                        <button

      <div className="min-w-0 flex-1">
        <div className="flex items-center gap-1 truncate text-xs font-semibold text-slate-200">
          {p.champ.n}
          {isPog && <Star className="h-3 w-3 shrink-0 text-amber-300" fill="currentColor" />}
        </div>
        <div className="text-[9px] uppercase tracking-wide text-slate-500">{p.champ.r}</div>
      </div>
      <div className="text-right font-mono text-xs font-semibold text-slate-200">
        {p.k}<span className="text-slate-500">/</span>{p.d}<span className="text-slate-500">/</span>{p.a}
      </div>
      <div className="w-12 text-right text-[11px] text-slate-400">{p.cs} cs</div>
    </div>
  );
}

function Scoreboard({ g }) {
  return (
    <div className="border-t border-slate-800/80 px-3 py-3">
      {/* Objective comparison */}
      <div className="mb-3 grid grid-cols-1 gap-1 rounded-xl border border-slate-800 bg-slate-950/40 p-2.5">
        <div className="mb-1 flex items-center justify-between text-[10px] font-bold uppercase tracking-widest">
          <span className="text-emerald-300">Your Team</span>
          <span className="text-slate-500">{g.dur}</span>
          <span className="text-rose-300">{g.opp}</span>
        </div>
        {OBJ_METRICS.map((m) => {
          const yv = readMetric(g.your, m), ev = readMetric(g.enemy, m);
          return (
            <div key={m.key} className="flex items-center justify-between gap-2 text-xs">
              <span className={`w-14 text-right font-bold tabular-nums ${yv >= ev ? 'text-emerald-300' : 'text-slate-400'}`}>{fmtMetric(yv, m)}</span>
              <span className="flex flex-1 items-center justify-center gap-1.5 text-[11px] font-semibold uppercase tracking-wide text-slate-400">
                <m.Icon className="h-3.5 w-3.5" /> {m.label}
              </span>
              <span className={`w-14 text-left font-bold tabular-nums ${ev > yv ? 'text-rose-300' : 'text-slate-400'}`}>{fmtMetric(ev, m)}</span>
            </div>
          );
        })}
      </div>

      {/* Two team scoreboards */}
      <div className="grid grid-cols-1 gap-2 sm:grid-cols-2">
        <div className={`rounded-xl border p-2 ${g.win ? 'border-emerald-500/30 bg-emerald-500/5' : 'border-rose-500/25 bg-rose-500/5'}`}>
          <div className="mb-1 flex items-center justify-between px-1.5 text-[10px] font-bold uppercase tracking-widest">
            <span className={g.win ? 'text-emerald-300' : 'text-rose-300'}>{g.win ? 'Victory' : 'Defeat'} · Your Team</span>
            <span className="font-mono text-slate-400">{g.your.k}/{g.your.d}/{g.your.a}</span>
          </div>
          {g.your.players.map((p, i) => (
            <PlayerRow key={i} p={p} isPog={p.champ === g.pog} side="your" />
          ))}
        </div>
        <div className={`rounded-xl border p-2 ${!g.win ? 'border-emerald-500/30 bg-emerald-500/5' : 'border-slate-700/60 bg-slate-900/40'}`}>
          <div className="mb-1 flex items-center justify-between px-1.5 text-[10px] font-bold uppercase tracking-widest">
            <span className="text-slate-300">{!g.win ? 'Victory · ' : ''}{g.opp}</span>
            <span className="font-mono text-slate-400">{g.enemy.k}/{g.enemy.d}/{g.enemy.a}</span>
          </div>
          {g.enemy.players.map((p, i) => (
            <PlayerRow key={i} p={p} isPog={false} side="enemy" />
          ))}
        </div>
      </div>
    </div>
  );
}

// ---- result panel ----------------------------------------------------------
function ResultPanel({ result, roster, challenge, openGame, setOpenGame, restart }) {
  const { wins, losses, rating, comp, games, mvpName } = result;
  const swept = losses === 0;
  const winPct = Math.round((wins / 18) * 100);

  // per-game team averages across the whole split (game-log averages)
  const avg = (() => {
    const n = games.length || 1;
    let k = 0, d = 0, a = 0, cs = 0, tow = 0, drk = 0, bar = 0, gold = 0;
    for (const g of games) {
      k += g.your.k; d += g.your.d; a += g.your.a;
      cs += g.your.players.reduce((s, p) => s + (p.cs || 0), 0);
      tow += g.your.obj.towers; drk += g.your.obj.drakes; bar += g.your.obj.barons;
      gold += g.your.gold;
    }
    const r = (x) => Math.round(x);
    const d1 = (x) => x.toFixed(1);
    return {
      kda: `${r(k / n)}/${r(d / n)}/${r(a / n)}`,
      ratio: (((k + a) / Math.max(1, d))).toFixed(1),
      cs: r(cs / n),
      drk: d1(drk / n), bar: d1(bar / n), tow: d1(tow / n),
      gold: (gold / n / 1000).toFixed(1) + 'k',
    };
  })();
  const avgTiles = [
    { Icon: Swords, label: 'Avg KDA', value: avg.kda },
    { Icon: Target, label: 'Avg CS',  value: avg.cs },
    { Icon: Flame,  label: 'Dragons', value: avg.drk },
    { Icon: Skull,  label: 'Barons',  value: avg.bar },
    { Icon: Castle, label: 'Towers',  value: avg.tow },
    { Icon: Coins,  label: 'Gold',    value: avg.gold },
  ];

  const cName = challenge ? (challenge.n || 'Your friend') : null;
  const cw = challenge ? challenge.rec[0] : null;
  const cl = challenge ? challenge.rec[1] : null;
  const verdict = challenge ? (wins > cw ? 'win' : wins === cw ? 'tie' : 'loss') : null;

  const [shareName, setShareName] = useState('');
  const [copied, setCopied] = useState(false);
  const shareUrl = `${shareBaseUrl()}#c=${encodeURIComponent(encodeChallenge(roster, result, shareName))}`;
  function copyLink() {
    const done = () => { setCopied(true); setTimeout(() => setCopied(false), 1800); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(shareUrl).then(done).catch(() => {
        const el = document.getElementById('share-url-input'); if (el) { el.select(); document.execCommand('copy'); done(); }
      });
    } else {
      const el = document.getElementById('share-url-input'); if (el) { el.select(); document.execCommand('copy'); done(); }
    }
  }

  return (
    <section className="space-y-5">
      {/* Verdict card */}
      <div className={`relative overflow-hidden rounded-3xl border p-6 text-center sm:p-8
        ${swept ? 'border-yellow-300/40 bg-gradient-to-br from-yellow-500/10 via-amber-500/5 to-transparent shadow-2xl shadow-yellow-400/10'
                : 'border-slate-800 bg-slate-900/50'}`}>
        {swept && <div className="pointer-events-none absolute inset-0 bg-[radial-gradient(40%_60%_at_50%_0%,rgba(250,204,21,0.18),transparent)]" />}
        <div className="relative">
          <div className="mb-2 flex items-center justify-center gap-2 text-xs font-semibold uppercase tracking-[0.3em] text-slate-400">
            <Activity className="h-4 w-4" /> Final Split Record
          </div>
          <div className={`text-6xl font-black tracking-tight sm:text-8xl ${swept ? 'bg-gradient-to-r from-yellow-200 to-amber-400 bg-clip-text text-transparent drop-shadow-[0_2px_30px_rgba(250,204,21,0.4)]' : 'text-slate-100'}`}>
            {wins}-{losses}
          </div>
          <div className="mt-2 text-sm font-medium text-slate-400">
            {winPct}% series win rate · Team Rating <span className="font-bold text-slate-200">{rating}</span> · Avg KDA ratio <span className="font-bold text-slate-200">{avg.ratio}</span>
          </div>

          {/* Split averages across the game log */}
          <div className="mx-auto mt-5 max-w-2xl">
            <div className="mb-2 text-[11px] font-semibold uppercase tracking-[0.25em] text-slate-500">Split Averages · Per Game</div>
            <div className="grid grid-cols-3 gap-2 sm:grid-cols-6">
              {avgTiles.map((s) => (
                <div key={s.label} className="rounded-xl border border-slate-800 bg-slate-950/50 px-2 py-2.5 text-center">
                  <s.Icon className="mx-auto mb-1 h-4 w-4 text-slate-500" strokeWidth={2} />
                  <div className="text-sm font-bold tabular-nums text-slate-100">{s.value}</div>
                  <div className="text-[10px] font-medium uppercase tracking-wide text-slate-500">{s.label}</div>
                </div>
              ))}
            </div>
          </div>

          {challenge && (
            <div className={`mx-auto mt-4 flex max-w-xl items-center justify-center gap-2 rounded-2xl border px-4 py-3 text-sm font-bold
              ${verdict === 'win' ? 'border-emerald-400/40 bg-emerald-500/10 text-emerald-200'
                : verdict === 'tie' ? 'border-sky-400/40 bg-sky-500/10 text-sky-200'
                : 'border-rose-400/40 bg-rose-500/10 text-rose-200'}`}>
              {verdict === 'win' ? <Trophy className="h-4 w-4" /> : verdict === 'tie' ? <HeartHandshake className="h-4 w-4" /> : <Skull className="h-4 w-4" />}
              {verdict === 'win'
                ? `You beat ${cName}'s ${cw}-${cl}!`
                : verdict === 'tie'
                ? `Dead even with ${cName} at ${cw}-${cl}.`
                : `${cName}'s ${cw}-${cl} still stands — run it back.`}
            </div>
          )}

          {comp && comp.flaws.length > 0 && (
            <div className="mx-auto mt-5 max-w-xl rounded-2xl border border-rose-400/30 bg-rose-500/5 p-4 text-left">
              <div className="flex items-center gap-2 text-sm font-bold uppercase tracking-wide text-rose-300">
                <TriangleAlert className="h-4 w-4" /> Comp Weaknesses Cost You Games
              </div>
              <ul className="mt-1 list-disc space-y-0.5 pl-5 text-sm text-rose-100/90">
                {comp.flaws.map((f, i) => <li key={i}>{f}</li>)}
              </ul>
            </div>
          )}

          <div className="mt-6 flex flex-wrap items-center justify-center gap-3 text-sm">
            <span className="inline-flex items-center gap-1.5 rounded-xl border border-slate-700 bg-slate-900/60 px-3 py-1.5 font-semibold text-slate-200">
              <Star className="h-4 w-4 text-amber-300" /> Split MVP: {mvpName}
            </span>
            <span className="inline-flex items-center gap-1.5 rounded-xl border border-slate-700 bg-slate-900/60 px-3 py-1.5 font-semibold text-slate-200">
              {swept ? <Trophy className="h-4 w-4 text-yellow-300" /> : <Skull className="h-4 w-4 text-rose-400" />}
              {swept ? 'Perfect Season' : `${losses} loss${losses === 1 ? '' : 'es'}`}
            </span>
          </div>

          <button
            onClick={restart}
            className="mt-6 inline-flex items-center gap-2 rounded-2xl bg-gradient-to-r from-sky-500 to-blue-600 px-6 py-3 text-sm font-bold uppercase tracking-wide text-white shadow-lg shadow-sky-500/30 transition hover:scale-[1.03] active:scale-95">
            <RotateCcw className="h-4 w-4" /> New Draft
          </button>
        </div>
      </div>

      {/* Challenge a friend */}
      <div className="rounded-3xl border border-fuchsia-500/20 bg-gradient-to-br from-fuchsia-500/5 to-transparent p-4 sm:p-5">
        <h3 className="flex items-center gap-2 text-sm font-bold uppercase tracking-widest text-fuchsia-200">
          <Users className="h-4 w-4 text-fuchsia-400" /> Challenge a Friend
        </h3>
        <p className="mt-1 text-sm text-slate-400">
          Send this link — it loads your exact roster and <span className="font-semibold text-slate-200">{wins}-{losses}</span> record for them to beat. No sign-up required.
        </p>
        <div className="mt-3 flex flex-col gap-2 sm:flex-row">
          <input
            value={shareName}
            onChange={(e) => setShareName(e.target.value)}
            maxLength={24}
            placeholder="Your name (optional)"
            className="flex-1 rounded-xl border border-slate-700 bg-slate-950/60 px-3 py-2.5 text-sm text-slate-100 placeholder-slate-500 outline-none transition focus:border-fuchsia-400/50 focus:ring-2 focus:ring-fuchsia-400/20"
          />
          <button
            onClick={copyLink}
            className={`inline-flex items-center justify-center gap-2 rounded-xl px-5 py-2.5 text-sm font-bold uppercase tracking-wide text-white shadow-lg transition hover:scale-[1.02] active:scale-95
              ${copied ? 'bg-emerald-600 shadow-emerald-500/30' : 'bg-gradient-to-r from-fuchsia-500 to-purple-600 shadow-fuchsia-500/30'}`}>
            {copied ? <Check className="h-4 w-4" /> : <Copy className="h-4 w-4" />}
            {copied ? 'Copied!' : 'Copy challenge link'}
          </button>
        </div>
        <input
          id="share-url-input"
          readOnly
          value={shareUrl}
          onFocus={(e) => e.target.select()}
          className="mt-2 w-full truncate rounded-xl border border-slate-800 bg-slate-950/60 px-3 py-2 font-mono text-xs text-slate-500 outline-none"
        />
      </div>

      {/* Drafted roster strip */}
      <div className="grid grid-cols-2 gap-3 sm:grid-cols-5">
        {ROLES.map((role) => (
          <RosterSlot key={role.id} role={role} champ={roster[role.id]} />
        ))}
      </div>

      {/* Interactive game log with full scoreboards */}
      <div className="rounded-3xl border border-slate-800 bg-slate-900/40 p-4 sm:p-5">
        <h3 className="mb-3 flex items-center gap-2 text-sm font-bold uppercase tracking-widest text-slate-300">
          <Activity className="h-4 w-4 text-sky-400" /> Game Log
          <span className="ml-auto text-[11px] font-medium normal-case tracking-normal text-slate-500">tap a game for the scoreboard</span>
        </h3>
        <div className="grid gap-1.5">
          {games.map((g) => {
            const isOpen = openGame === g.i;
            return (
              <div key={g.i} className={`rounded-xl border transition-colors ${g.win ? 'border-emerald-500/20 bg-emerald-500/5' : 'border-rose-500/20 bg-rose-500/5'}`}>
                <button
                  onClick={() => setOpenGame(isOpen ? null : g.i)}
                  className="flex w-full items-center gap-3 px-3 py-2 text-left">
                  <span className="w-7 text-center text-xs font-bold text-slate-500">{g.i}</span>
                  <span className={`grid h-7 w-7 place-items-center rounded-lg text-xs font-black ${g.win ? 'bg-emerald-500/20 text-emerald-300' : 'bg-rose-500/20 text-rose-300'}`}>
                    {g.win ? 'W' : 'L'}
                  </span>
                  <span className="text-sm font-semibold text-slate-300">vs <span className="text-slate-100">{g.opp}</span></span>
                  <span className="ml-2 hidden font-mono text-xs text-slate-500 sm:inline">{g.your.k}/{g.your.d}/{g.your.a}</span>
                  <span className="ml-auto flex items-center gap-2">
                    <span className="hidden text-[11px] font-semibold text-slate-400 sm:inline">{g.pog.n}</span>
                    <Avatar champ={g.pog} size="xs" />
                    <ChevronDown className={`h-4 w-4 text-slate-500 transition-transform ${isOpen ? 'rotate-180' : ''}`} />
                  </span>
                </button>
                {isOpen && <Scoreboard g={g} />}
              </div>
            );
          })}
        </div>
      </div>
    </section>
  );
}

createRoot(document.getElementById('root')).render(<DraftSimulator />);
  </script>
</body>
</html>
